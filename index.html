<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DIETABOT</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#198754">

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4765/4765100.png">
    
    <link rel="manifest" href="manifest.json">

    <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100vh; 
        width: 100vw; 
        overflow: hidden; 
        background-color: #f8f9fa; /* Fondo claro */
    }
    iframe { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        border: none;
        -webkit-overflow-scrolling: touch; /* Fluidez en iOS */
    }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbyyCQ__APd4R_g6S98izf4X6BlWD5VwJ6dPaLJOmUjzvCiIAMiv2d3QqCghnNxCctVLNQ/exec"></iframe>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(() => console.log('PWA DIETABOT: Lista para instalar'))
            .catch(err => console.log('Error PWA:', err));
        });
      }
    </script>
</body>
</html>
